<svg width="100%" viewBox="0 0 680 540" xmlns="http://www.w3.org/2000/svg" style="font-family:sans-serif;">
  <title>IKOKA Stick Solar Repeater Wiring Diagram</title>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text font-size="15" font-weight="500" x="340" y="26" text-anchor="middle" fill="#2C2C2A">Wiring diagram (with optional INA3221)</text>

  <!-- Solar Panel (left) -->
  <rect x="50" y="76" width="120" height="50" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="110" y="95" text-anchor="middle" dominant-baseline="central" fill="#633806">Solar panel</text>
  <text font-size="12" x="110" y="113" text-anchor="middle" dominant-baseline="central" fill="#854F0B">10W, 18V</text>

  <!-- INA3221 (center, dashed = optional) -->
  <rect x="210" y="44" width="260" height="110" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5" stroke-dasharray="6 3"/>
  <text font-size="14" font-weight="500" x="340" y="66" text-anchor="middle" dominant-baseline="central" fill="#3C3489">INA3221 (optional)</text>
  <rect x="222" y="80" width="112" height="40" rx="6" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
  <text font-size="12" x="278" y="100" text-anchor="middle" dominant-baseline="central" fill="#3C3489">CH3: Solar +</text>
  <rect x="346" y="80" width="112" height="40" rx="6" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
  <text font-size="12" x="402" y="100" text-anchor="middle" dominant-baseline="central" fill="#3C3489">CH1: Battery +</text>

  <!-- Battery (right) -->
  <rect x="520" y="76" width="120" height="50" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="580" y="95" text-anchor="middle" dominant-baseline="central" fill="#27500A">Battery</text>
  <text font-size="12" x="580" y="113" text-anchor="middle" dominant-baseline="central" fill="#3B6D11">3P1S + PCM</text>

  <!-- Waveshare (center) -->
  <rect x="240" y="228" width="200" height="70" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="340" y="252" text-anchor="middle" dominant-baseline="central" fill="#0C447C">Waveshare Solar</text>
  <text font-size="14" font-weight="500" x="340" y="270" text-anchor="middle" dominant-baseline="central" fill="#0C447C">Power Manager</text>

  <!-- IKOKA Stick -->
  <rect x="200" y="370" width="160" height="54" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="280" y="390" text-anchor="middle" dominant-baseline="central" fill="#085041">IKOKA Stick</text>
  <text font-size="12" x="280" y="408" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">E22P LoRa + XIAO</text>

  <!-- Bandpass Filter -->
  <rect x="430" y="370" width="130" height="54" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="495" y="390" text-anchor="middle" dominant-baseline="central" fill="#712B13">Bandpass filter</text>
  <text font-size="12" x="495" y="408" text-anchor="middle" dominant-baseline="central" fill="#993C1D">910.525 MHz</text>

  <!-- Antenna -->
  <rect x="430" y="474" width="130" height="40" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="495" y="494" text-anchor="middle" dominant-baseline="central" fill="#444441">Antenna</text>

  <!-- ===== SOLID: Positive wires through INA3221 ===== -->

  <!-- Solar + to INA CH3 -->
  <line x1="170" y1="100" x2="220" y2="100" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Battery + to INA CH1 -->
  <line x1="520" y1="100" x2="460" y2="100" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- INA CH3 down to Waveshare solar + -->
  <path d="M278 120 L278 166 L296 166 L296 226" stroke="#D85A30" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <text font-size="11" x="280" y="200" fill="#D85A30">Solar +</text>

  <!-- INA CH1 down to Waveshare batt + -->
  <path d="M402 120 L402 166 L384 166 L384 226" stroke="#1D9E75" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <text font-size="11" x="392" y="200" fill="#1D9E75">Batt +</text>

  <!-- ===== DASHED: Negative wires direct to Waveshare ===== -->

  <!-- Solar - direct -->
  <path d="M110 126 L110 182 L256 182 L256 226" stroke="#D85A30" stroke-width="1" stroke-dasharray="4 3" opacity="0.6" fill="none" marker-end="url(#arr)"/>
  <text font-size="11" x="180" y="176" fill="#D85A30" opacity="0.8">Solar -</text>

  <!-- Battery - direct -->
  <path d="M580 126 L580 182 L424 182 L424 226" stroke="#1D9E75" stroke-width="1" stroke-dasharray="4 3" opacity="0.6" fill="none" marker-end="url(#arr)"/>
  <text font-size="11" x="466" y="176" fill="#1D9E75" opacity="0.8">Batt -</text>

  <!-- ===== USB: Waveshare to IKOKA ===== -->
  <path d="M340 298 L340 330 L280 330 L280 368" stroke="#5F5E5A" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <text font-size="12" x="318" y="344" text-anchor="end" fill="#5F5E5A">USB</text>

  <!-- ===== I2C: IKOKA to INA3221 ===== -->
  <path d="M200 397 L188 397 L188 140 L208 140" stroke="#7F77DD" stroke-width="1.5" stroke-dasharray="5 3" fill="none" marker-end="url(#arr)"/>
  <text font-size="12" x="182" y="240" text-anchor="end" fill="#7F77DD">I2C</text>
  <text font-size="11" x="182" y="256" text-anchor="end" fill="#7F77DD">VCC, GND</text>
  <text font-size="11" x="182" y="270" text-anchor="end" fill="#7F77DD">SDA, SCL</text>

  <!-- ===== RF: IKOKA to Filter to Antenna ===== -->
  <line x1="360" y1="397" x2="428" y2="397" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arr)"/>
  <text font-size="12" x="394" y="389" fill="#5F5E5A">SMA</text>

  <line x1="495" y1="424" x2="495" y2="472" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arr)"/>
  <text font-size="12" x="511" y="452" fill="#5F5E5A">N-Type</text>

  <!-- ===== LEGEND ===== -->
  <line x1="50" y1="490" x2="72" y2="490" stroke="#D85A30" stroke-width="1.5"/>
  <text font-size="11" x="78" y="494" fill="#5F5E5A">Positive (through INA)</text>
  <line x1="50" y1="506" x2="72" y2="506" stroke="#D85A30" stroke-width="1" stroke-dasharray="4 3" opacity="0.6"/>
  <text font-size="11" x="78" y="510" fill="#5F5E5A">Negative (direct to Waveshare)</text>
  <line x1="50" y1="522" x2="72" y2="522" stroke="#7F77DD" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text font-size="11" x="78" y="526" fill="#5F5E5A">I2C data bus</text>
  <line x1="300" y1="490" x2="322" y2="490" stroke="#5F5E5A" stroke-width="1.5"/>
  <text font-size="11" x="328" y="494" fill="#5F5E5A">RF / USB</text>
  <rect x="300" y="504" width="12" height="12" rx="3" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text font-size="11" x="318" y="514" fill="#D85A30">Solar path</text>
  <rect x="300" y="520" width="12" height="12" rx="3" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text font-size="11" x="318" y="530" fill="#1D9E75">Battery path</text>
</svg>
